databases:
  - name: alpha-blog-db
    databaseName: alpha_blog
    plan: free

services:
  - type: web
    name: alpha-blog-web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: alpha-blog-db
          property: connectionString
      - key: SECRET_KEY_BASE
        generateValue: true
